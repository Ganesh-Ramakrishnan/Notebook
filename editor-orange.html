<input type="file" id="fileInput" accept=".docx,.pdf" hidden>

<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <a class="brand" href="index.html"><span class="bname">NoteFlow</span><span class="bsub">PRODUCTIVITY SUITE</span></a>
    <nav class="sb-nav">
      <a class="nav-item" data-tip="Home" href="index.html"><svg class="i"><use href="#ic-home"/></svg><span class="label">Home</span></a>
      <a class="nav-item" data-tip="Recent" href="recent.html"><svg class="i"><use href="#ic-clock"/></svg><span class="label">Recent</span></a>
      <a class="nav-item" data-tip="Favourites" href="favourites.html"><svg class="i"><use href="#ic-star"/></svg><span class="label">Favourites</span></a>
      <a class="nav-item" data-tip="Templates" href="templates.html"><svg class="i"><use href="#ic-template"/></svg><span class="label">Templates</span></a>
      <a class="nav-item" data-tip="Trash" href="trash.html"><svg class="i"><use href="#ic-trash"/></svg><span class="label">Trash</span></a>
    </nav>
    <nav class="sb-nav">
      <div class="nav-label">SYSTEM</div>
      <a class="nav-item" data-tip="Settings" href="settings.html"><svg class="i"><use href="#ic-gear"/></svg><span class="label">Settings</span></a>
    </nav>
    <div class="sb-spacer"></div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <!-- topbar -->
    <header class="topbar">
      <button class="panel-toggle" id="panelToggle" title="Toggle menu"><svg class="i"><use href="#ic-menu"/></svg></button>
      <a class="ed-back" href="index.html"><svg class="i"><use href="#ic-back"/></svg> Back</a>
      <div class="crumb"><span>Home</span><span class="sep">/</span><span class="cur" id="crumbCur">Document</span></div>
      <div class="top-right">
        <span class="ed-status" id="status"><span class="dot"></span> <span id="statusTxt">Saved</span></span>
        <span class="ed-count" id="wordCount">0 words</span>
        <button class="icon-btn" id="favBtn" title="Favourite"><svg class="i"><use href="#ic-star"/></svg></button>
        <button class="btn-share"><svg class="i"><use href="#ic-share"/></svg> Share</button>
        <button class="icon-btn" id="themeBtn" title="Theme"><svg class="i"><use href="#ic-contrast"/></svg></button>
        <button class="icon-btn" title="More"><svg class="i"><use href="#ic-more"/></svg></button>
      </div>
    </header>

    <!-- formatting toolbar -->
    <div class="ed-toolbar" id="toolbar">
      <div class="tb-group">
        <button class="tb-btn" data-act="undo" data-tip="Undo"><svg class="i"><use href="#ic-undo"/></svg></button>
        <button class="tb-btn" data-act="redo" data-tip="Redo"><svg class="i"><use href="#ic-redo"/></svg></button>
      </div>
      <div class="tb-sep"></div>

      <!-- block type dropdown -->
      <div class="tb-pop-wrap">
        <button class="tb-select" id="blockBtn"><svg class="i"><use href="#ic-type"/></svg><span class="lbl" id="blockLbl">Paragraph</span><svg class="i caret"><use href="#ic-chevron"/></svg></button>
        <div class="tb-pop" id="blockPop">
          <button class="pop-item" data-block="paragraph"><svg class="i"><use href="#ic-type"/></svg> Paragraph</button>
          <button class="pop-item" data-block="h1"><svg class="i"><use href="#ic-h1"/></svg> Heading 1</button>
          <button class="pop-item" data-block="h2"><svg class="i"><use href="#ic-h2"/></svg> Heading 2</button>
          <button class="pop-item" data-block="h3"><svg class="i"><use href="#ic-h3"/></svg> Heading 3</button>
          <button class="pop-item" data-block="bullet"><svg class="i"><use href="#ic-list"/></svg> Bullet list</button>
          <button class="pop-item" data-block="ordered"><svg class="i"><use href="#ic-list-ol"/></svg> Numbered list</button>
          <button class="pop-item" data-block="task"><svg class="i"><use href="#ic-checklist"/></svg> Task list</button>
          <button class="pop-item" data-block="quote"><svg class="i"><use href="#ic-quote"/></svg> Quote</button>
          <button class="pop-item" data-block="code"><svg class="i"><use href="#ic-codeblock"/></svg> Code block</button>
        </div>
      </div>
      <div class="tb-sep"></div>

      <!-- lists -->
      <div class="tb-group">
        <button class="tb-btn" data-act="bullet" data-tip="Bullet list"><svg class="i"><use href="#ic-list"/></svg></button>
        <button class="tb-btn" data-act="ordered" data-tip="Numbered list"><svg class="i"><use href="#ic-list-ol"/></svg></button>
        <button class="tb-btn" data-act="task" data-tip="Checklist (checkbox)"><svg class="i"><use href="#ic-checklist"/></svg></button>
      </div>
      <div class="tb-sep"></div>

      <!-- marks -->
      <div class="tb-group">
        <button class="tb-btn" data-act="bold" data-tip="Bold"><svg class="i"><use href="#ic-bold"/></svg></button>
        <button class="tb-btn" data-act="italic" data-tip="Italic"><svg class="i"><use href="#ic-italic"/></svg></button>
        <button class="tb-btn" data-act="underline" data-tip="Underline"><svg class="i"><use href="#ic-underline"/></svg></button>
        <button class="tb-btn" data-act="strike" data-tip="Strikethrough"><svg class="i"><use href="#ic-strike"/></svg></button>
        <button class="tb-btn" data-act="code" data-tip="Inline code"><svg class="i"><use href="#ic-code"/></svg></button>
      </div>

      <!-- colour + highlight -->
      <div class="tb-group">
        <div class="tb-pop-wrap">
          <button class="tb-btn" id="colorBtn" data-tip="Text colour"><svg class="i"><use href="#ic-droplet"/></svg></button>
          <div class="tb-pop" id="colorPop">
            <div class="pop-h">Text colour</div>
            <div class="sw-grid" id="colorGrid"></div>

function slashRender(){
  let el, selected = 0, items = [], pickCmd
  const paint = ()=>{
    el.innerHTML = '<div class="slash-head">Blocks</div>'
    if(!items.length){ el.insertAdjacentHTML('beforeend', '<div class="slash-empty">No matches</div>'); return }
    items.forEach((it,i)=>{
      const b=document.createElement('button')
      b.className='slash-item'+(i===selected?' active':'')
      b.innerHTML=`<span class="slash-ic"><svg class="i"><use href="#${it.icon}"/></svg></span><span class="slash-tx"><b>${esc(it.title)}</b><small>${esc(it.desc)}</small></span>`
      b.addEventListener('mousedown', e=>{ e.preventDefault(); pickCmd(it) })
      el.appendChild(b)
    })
  }
  // position the menu, flipping above the caret when there isn't room below
  const place = (rect)=>{
    if(!rect) return
    const margin=8, gap=6
    const vh=window.innerHeight, vw=window.innerWidth
    const w=el.offsetWidth||272
    const below=vh-rect.bottom-margin           // space under the caret
    const above=rect.top-margin                 // space over the caret
    const down=below>=above                     // open up if there's more room above
    el.style.maxHeight=Math.min(360, Math.max(140, (down?below:above)-gap))+'px'
    const h=el.offsetHeight                      // measured after max-height is applied
    let top=down ? (rect.bottom+gap) : (rect.top-gap-h)
    let left=rect.left
    if(left+w>vw-margin) left=vw-w-margin
    if(left<margin) left=margin
    el.style.left=Math.round(left)+'px'
    el.style.top=Math.round(Math.max(margin, top))+'px'
    el.style.visibility='visible'
  }
  return {
    onStart(props){
      items=props.items; pickCmd=props.command; selected=0
      el=document.createElement('div'); el.className='slash-menu'; el.style.visibility='hidden'; document.body.appendChild(el)
      paint(); place(props.clientRect && props.clientRect())
    },
    onUpdate(props){ items=props.items; pickCmd=props.command; if(selected>=items.length) selected=0; paint(); place(props.clientRect && props.clientRect()) },
    onKeyDown(props){
      const k=props.event.key
      if(k==='ArrowDown'){ selected=(selected+1)%Math.max(items.length,1); paint(); return true }
      if(k==='ArrowUp'){ selected=(selected-1+items.length)%Math.max(items.length,1); paint(); return true }
      if(k==='Enter'){ if(items[selected]) pickCmd(items[selected]); return true }
      if(k==='Escape'){ return true }
      return false
    },
    onExit(){ if(el) el.remove(); el=null }
  }
}

/* ---------- import: Word (.docx) & PDF ---------- */
async function importFile(file){
  const name = (file.name||'').toLowerCase()
  try{
    if(name.endsWith('.docx')){
      if(!window.mammoth) throw new Error('Word importer not loaded (need internet)')
      const arrayBuffer = await file.arrayBuffer()
      const res = await window.mammoth.convertToHtml({ arrayBuffer })
      editor.chain().focus().insertContent(res.value || '<p></p>').run()
    } else if(name.endsWith('.pdf')){
      const pdfjs = await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.min.mjs')
      pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@6.1.200/build/pdf.worker.min.mjs'
      const data = new Uint8Array(await file.arrayBuffer())
      const pdf = await pdfjs.getDocument({ data }).promise
      let html = ''
      for(let p=1; p<=pdf.numPages; p++){
        const page = await pdf.getPage(p)
        const tc = await page.getTextContent()
        const text = tc.items.map(i=>i.str).join(' ').replace(/\s+/g,' ').trim()
        if(text) html += '<p>'+esc(text)+'</p>'
        if(p < pdf.numPages) html += '<hr>'
      }
      editor.chain().focus().insertContent(html || '<p></p>').run()
    } else {
      alert('Please choose a .docx or .pdf file.')
    }
  }catch(err){ console.error(err); alert('Import failed: '+err.message) }
}

  import:()=>fileInput.click(),
  link:()=>{
    const prev=editor.getAttributes('link').href
    const url=window.prompt('Link URL', prev||'https://')
    if(url===null) return
    if(url===''){ C().extendMarkRange('link').unsetLink().run(); return }
    C().extendMarkRange('link').setLink({ href:url }).run()
  },
  addColumnAfter:()=>C().addColumnAfter().run(), addRowAfter:()=>C().addRowAfter().run(),
  toggleHeaderRow:()=>C().toggleHeaderRow().run(), toggleHeaderColumn:()=>C().toggleHeaderColumn().run(),
  mergeOrSplit:()=>C().mergeOrSplit().run(),
  deleteColumn:()=>C().deleteColumn().run(), deleteRow:()=>C().deleteRow().run(),
  deleteTable:()=>C().deleteTable().run(),
}
document.querySelectorAll('[data-act]').forEach(btn=>{
  const a=btn.dataset.act
  if(actions[a]) btn.addEventListener('click', ()=>{ actions[a](); closePops() })
})

/* block dropdown */
const blockMap = {
  paragraph:()=>C().setParagraph().run(), h1:()=>C().toggleHeading({level:1}).run(),
  h2:()=>C().toggleHeading({level:2}).run(), h3:()=>C().toggleHeading({level:3}).run(),
  bullet:()=>C().toggleBulletList().run(), ordered:()=>C().toggleOrderedList().run(),
  task:()=>C().toggleTaskList().run(), quote:()=>C().toggleBlockquote().run(), code:()=>C().toggleCodeBlock().run(),
}
document.querySelectorAll('[data-block]').forEach(b=> b.addEventListener('click', ()=>{ blockMap[b.dataset.block](); closePops() }))

/* callout colours */
document.querySelectorAll('[data-callout]').forEach(b=> b.addEventListener('click', ()=>{
  const color=b.dataset.callout
  if(editor.isActive('callout')) C().updateAttributes('callout',{color}).run()
  else C().setCallout({color}).run()
  closePops()
}))

/* colour + highlight swatches */
const textColors = ['#ef7415','#e5484d','#f5b450','#16a86b','#0fb39a','#4f6ef7','#a78bfa','#f472b6','#1a1b24','#6c6d7b','#ffffff','#9596a2']
const hiColors   = ['#ffe08a','#ffd8a8','#b9f6ca','#a7f3d0','#bbdefb','#c7d2fe','#e9d5ff','#f8bbd0','#fde68a','#bbf7d0','#bfdbfe','#fecaca']
function fillSwatches(grid, colors, onPick){
  colors.forEach(c=>{ const s=document.createElement('button'); s.className='sw'; s.style.background=c; s.title=c
    s.addEventListener('click', ()=>{ onPick(c); closePops() }); grid.appendChild(s) })
}
fillSwatches($('#colorGrid'), textColors, (c)=>C().setColor(c).run())
fillSwatches($('#hiliteGrid'), hiColors, (c)=>C().toggleHighlight({color:c}).run())

/* table cell colours */
const cellColors = ['#fde68a','#bbf7d0','#bfdbfe','#fecaca','#e9d5ff','#fed7aa']
const cellWrap = $('#cellColors')
cellColors.forEach(c=>{ const s=document.createElement('button'); s.className='tt-sw'; s.style.background=c; s.title=c
  s.addEventListener('click', ()=>C().setCellAttribute('backgroundColor', c).run()); cellWrap.appendChild(s) })
const clr=document.createElement('button'); clr.className='tt-sw clear'; clr.title='Clear cell colour'
clr.innerHTML='<svg class="i"><use href="#ic-x"/></svg>'
clr.addEventListener('click', ()=>C().setCellAttribute('backgroundColor', null).run()); cellWrap.appendChild(clr)

/* code block: language picker + copy */
const CODE_LANGS = [
  ['plaintext','Plain text'],['javascript','JavaScript'],['typescript','TypeScript'],['python','Python'],
  ['java','Java'],['c','C'],['cpp','C++'],['csharp','C#'],['go','Go'],['rust','Rust'],['php','PHP'],
  ['ruby','Ruby'],['swift','Swift'],['kotlin','Kotlin'],['sql','SQL'],['xml','HTML / XML'],['css','CSS'],
  ['scss','SCSS'],['json','JSON'],['yaml','YAML'],['bash','Bash / Shell'],['markdown','Markdown'],
  ['lua','Lua'],['r','R'],['graphql','GraphQL'],['makefile','Makefile'],['ini','INI / TOML'],['diff','Diff'],
]
const codeLang = $('#codeLang')
CODE_LANGS.forEach(([v,label])=>{ const o=document.createElement('option'); o.value=v; o.textContent=label; codeLang.appendChild(o) })
codeLang.addEventListener('change', ()=> C().updateAttributes('codeBlock', { language: codeLang.value }).run())
$('#copyCode').addEventListener('click', ()=>{
  const { $from } = editor.state.selection
  for(let d=$from.depth; d>0; d--){ const n=$from.node(d)
    if(n.type.name==='codeBlock'){
      navigator.clipboard.writeText(n.textContent)
      const lbl=$('#copyCodeLbl'); lbl.textContent='Copied!'; setTimeout(()=>lbl.textContent='Copy',1200)
      return
    } }
})

/* popovers */
function closePops(){ document.querySelectorAll('.tb-pop.open').forEach(p=>p.classList.remove('open')) }
function bindPop(btnId, popId){
  const btn=document.getElementById(btnId), pop=document.getElementById(popId)
  btn.addEventListener('click', e=>{ e.stopPropagation(); const open=pop.classList.contains('open'); closePops(); if(!open) pop.classList.add('open') })
  pop.addEventListener('click', e=>e.stopPropagation())
}
bindPop('blockBtn','blockPop'); bindPop('colorBtn','colorPop'); bindPop('hiliteBtn','hilitePop'); bindPop('calloutBtn','calloutPop')
document.addEventListener('click', closePops)

/* live state */
const toggleByAct = {
  bold:()=>editor.isActive('bold'), italic:()=>editor.isActive('italic'),
  underline:()=>editor.isActive('underline'), strike:()=>editor.isActive('strike'),
  code:()=>editor.isActive('code'), subscript:()=>editor.isActive('subscript'), superscript:()=>editor.isActive('superscript'),
  bullet:()=>editor.isActive('bulletList'), ordered:()=>editor.isActive('orderedList'), task:()=>editor.isActive('taskList'),
  alignleft:()=>editor.isActive({textAlign:'left'}), aligncenter:()=>editor.isActive({textAlign:'center'}),
  alignright:()=>editor.isActive({textAlign:'right'}), alignjustify:()=>editor.isActive({textAlign:'justify'}),
  link:()=>editor.isActive('link'),
}
function blockLabel(){
  if(editor.isActive('heading',{level:1})) return 'Heading 1'
  if(editor.isActive('heading',{level:2})) return 'Heading 2'
  if(editor.isActive('heading',{level:3})) return 'Heading 3'
  if(editor.isActive('bulletList')) return 'Bullet list'
  if(editor.isActive('orderedList')) return 'Numbered list'
  if(editor.isActive('taskList')) return 'Task list'
  if(editor.isActive('blockquote')) return 'Quote'
  if(editor.isActive('codeBlock')) return 'Code block'
  if(editor.isActive('callout')) return 'Callout'
  return 'Paragraph'
}
const status=$('#status'), statusTxt=$('#statusTxt')
let saveTimer=null
function markEditing(){
  status.classList.add('editing'); statusTxt.textContent='Editing…'
  clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ status.classList.remove('editing'); statusTxt.textContent='Saved' }, 800)
}
function update(){
  document.querySelectorAll('[data-act]').forEach(b=>{ const f=toggleByAct[b.dataset.act]; if(f) b.classList.toggle('active', f()) })
  document.getElementById('calloutBtn').classList.toggle('active', editor.isActive('callout'))
  $('#blockLbl').textContent = blockLabel()
  const words = editor.storage.characterCount.words()
  $('#wordCount').textContent = words + (words===1?' word':' words')
  $('#readTime').textContent = Math.max(1, Math.round(words/200)) + ' min'
  $('#tableTools').classList.toggle('show', editor.isActive('table'))
  const inCode = editor.isActive('codeBlock')
  $('#codeTools').classList.toggle('show', inCode)
  if(inCode) codeLang.value = editor.getAttributes('codeBlock').language || 'plaintext'
}
editor.on('selectionUpdate', update)
editor.on('transaction', update)
editor.on('update', markEditing)
update()
</script>
</body>
</html>
