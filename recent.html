<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteFlow — Recent</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/orange.css">
<style>
  .empty{color:var(--mute);font-size:14px;padding:40px 4px;text-align:center;line-height:1.7}
  .nbcard .fav-btn{position:absolute;top:10px;right:10px;width:28px;height:28px;border:none;border-radius:8px;background:var(--elev);color:var(--mute);cursor:pointer;display:none;place-items:center}
  .nbcard:hover .fav-btn,.nbcard .fav-btn.on{display:grid}
  .fav-btn .i{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2}
  .fav-btn.on{color:var(--primary)}
  .fav-btn.on .i{fill:var(--primary);stroke:var(--primary)}
  .fav-btn:hover{color:var(--primary)}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="ic-menu" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></symbol>
  <symbol id="ic-home" viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/><rect x="9.5" y="14" width="5" height="6"/></symbol>
  <symbol id="ic-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></symbol>
  <symbol id="ic-star" viewBox="0 0 24 24"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></symbol>
  <symbol id="ic-template" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></symbol>
  <symbol id="ic-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></symbol>
  <symbol id="ic-gear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 4.6 15H4.5a2 2 0 0 1 0-4h.1A1.6 1.6 0 0 0 6.2 8.4l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 12 4.6V4.5a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-1.1 2.7v.1a2 2 0 0 1 0 4z"/></symbol>
  <symbol id="ic-contrast" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v18a9 9 0 0 0 0-18z" fill="currentColor" stroke="none"/></symbol>
  <symbol id="ic-book" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></symbol>
  <symbol id="ic-board" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></symbol>
  <symbol id="ic-doc" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></symbol>
  <symbol id="ic-logout" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></symbol>
</defs></svg>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <a class="brand" href="index.html"><span class="bname">NoteFlow</span><span class="bsub">PRODUCTIVITY SUITE</span></a>
    <nav class="sb-nav">
      <a class="nav-item" data-tip="Home" href="index.html"><svg class="i"><use href="#ic-home"/></svg><span class="label">Home</span></a>
      <a class="nav-item active" data-tip="Recent" href="recent.html"><svg class="i"><use href="#ic-clock"/></svg><span class="label">Recent</span></a>
      <a class="nav-item" data-tip="Favourites" href="favourites.html"><svg class="i"><use href="#ic-star"/></svg><span class="label">Favourites</span></a>
      <a class="nav-item" data-tip="Templates" href="templates.html"><svg class="i"><use href="#ic-template"/></svg><span class="label">Templates</span></a>
      <a class="nav-item" data-tip="Trash" href="trash.html"><svg class="i"><use href="#ic-trash"/></svg><span class="label">Trash</span></a>
    </nav>
    <nav class="sb-nav">
      <div class="nav-label">SYSTEM</div>
      <a class="nav-item" data-tip="Settings" href="settings.html"><svg class="i"><use href="#ic-gear"/></svg><span class="label">Settings</span></a>
    </nav>
    <div class="sb-spacer"></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="panel-toggle" id="panelToggle" title="Toggle menu"><svg class="i"><use href="#ic-menu"/></svg></button>
      <div class="crumb" style="display:flex;align-items:center;gap:8px;font-weight:600"><a href="index.html" style="color:var(--mute);text-decoration:none">Home</a><span style="color:var(--mute)">/</span><span>Recent</span></div>
      <div class="top-right">
        <button class="icon-btn" id="themeBtn" title="Theme"><svg class="i"><use href="#ic-contrast"/></svg></button>
        <div class="profile">
          <button class="huser" id="avatarBtn"><span class="uname">Ganesh</span><span class="ava-green"></span></button>
          <div class="profile-menu" id="profileMenu" hidden>
            <div class="pm-head"><span class="pm-ava">G</span><div><div class="pm-name">Ganesh</div><div class="pm-email">ganesh@noteflow.app</div></div></div>
            <div class="pm-divider"></div>
            <a class="pm-row" href="index.html"><svg class="i"><use href="#ic-home"/></svg> Back to Home</a>
            <a class="pm-row" href="settings.html"><svg class="i"><use href="#ic-gear"/></svg> Settings</a>
          </div>
        </div>
      </div>
    </header>
    <section class="content">
      <div class="page-head"><div>
        <h2 class="ph-title">Recent</h2>
        <p class="ph-sub">Everything you’ve worked on, newest first.</p>
      </div></div>
      <div class="card-grid" id="grid"></div>
    </section>
  </main>
  <div class="scrim" id="scrim"></div>
</div>

<script src="js/shell.js"></script>
<script>
(function(){
  const NF=window.NF, grid=document.getElementById('grid');
  function card(f){ return '<div class="ncard nbcard libcard" data-open="'+NF.esc(f.open)+'" data-id="'+NF.esc(f.id)+'">'+
    '<div class="nc-top"><span class="nc-ico '+f.cls+'"><svg class="i"><use href="#'+f.icon+'"/></svg></span><span class="nc-time">'+NF.timeAgo(f.updated)+'</span></div>'+
    '<h3>'+NF.esc(f.title)+'</h3>'+
    '<p style="text-transform:capitalize">'+NF.esc(f.type)+' · '+NF.esc(f.sub)+'</p>'+
    '<button class="fav-btn'+(NF.isFav(f.id)?' on':'')+'" title="Favourite"><svg class="i"><use href="#ic-star"/></svg></button>'+
    '</div>'; }
  function render(){
    const files=NF.allFiles();
    if(!files.length){ grid.innerHTML='<div class="empty">Nothing here yet.<br>Create a notebook, whiteboard or document from Home.</div>'; return; }
    grid.innerHTML=files.map(card).join('');
    grid.querySelectorAll('.libcard').forEach(el=>{
      el.onclick=()=>location.href=el.dataset.open;
      const fav=el.querySelector('.fav-btn'); if(fav) fav.onclick=(e)=>{ e.stopPropagation(); const on=NF.toggleFav(el.dataset.id); fav.classList.toggle('on',on); };
    });
  }
  render();
})();
</script>
</body>
</html>
